name: Build OVATION Global Merge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-ovation
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build GLOBAL merged CSV
        run: |
          python3 - <<'PY'
          import os, re, tempfile

          BASE = "./data/history/ovation_csv"
          OUT_DIR = "./data/history/global_merge"
          OUT_PATH = os.path.join(OUT_DIR, "ovation_merged.csv")

          day_re = re.compile(r"^\d{4}-\d{2}-\d{2}$")
          file_re = re.compile(r"^(?P<hh>\d{2})(?P<mm>\d{2})(?P<ss>\d{2})Z\.csv$")

          def ensure_dir(p): os.makedirs(p, exist_ok=True)

          def write_atomic(path, content: str):
            ensure_dir(os.path.dirname(path))
            fd, tmp = tempfile.mkstemp(prefix=".tmp_", dir=os.path.dirname(path))
            try:
              with os.fdopen(fd, "w", encoding="utf-8", newline="\n") as f:
                f.write(content)
              os.replace(tmp, path)
            finally:
              try:
                if os.path.exists(tmp):
                  os.remove(tmp)
              except Exception:
                pass

          def iter_snapshot_files():
            if not os.path.isdir(BASE):
              return
            for day in sorted(os.listdir(BASE)):
              if not day_re.match(day):
                continue
              day_dir = os.path.join(BASE, day)
              if not os.path.isdir(day_dir):
                continue
              for f in sorted(os.listdir(day_dir)):
                if not file_re.match(f):
                  continue
                yield day, os.path.join(day_dir, f), f

          def snapshot_ts(day: str, filename: str) -> str:
            hh = filename[0:2]; mm = filename[2:4]; ss = filename[4:6]
            return f"{day}T{hh}:{mm}:{ss}Z"

          header = "snapshot_time_utc,lon,lat,probability\n"
          out_lines = [header]

          total_files = 0
          total_rows = 0

          for day, path, fname in iter_snapshot_files():
            ts = snapshot_ts(day, fname)
            with open(path, "r", encoding="utf-8", errors="replace") as fp:
              lines = fp.read().splitlines()

            if not lines:
              continue

            start = 1 if lines[0].strip().lower() == "lon,lat,probability" else 0
            for ln in lines[start:]:
              if not ln.strip():
                continue
              out_lines.append(f"{ts},{ln}")
              total_rows += 1

            total_files += 1

          write_atomic(OUT_PATH, "\n".join(out_lines) + "\n")
          print(f"[global_merge] wrote {OUT_PATH}")
          print(f"[global_merge] snapshot files: {total_files}, rows: {total_rows}")
          PY

      - name: Upload merged CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovation_merged_csv
          path: ./data/history/global_merge/ovation_merged.csv
          if-no-files-found: error