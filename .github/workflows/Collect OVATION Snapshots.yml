name: Collect OVATION Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # cada 5 minutos

permissions:
  contents: write

concurrency:
  group: collect-ovation
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Collect OVATION snapshot
        env:
          OVATION_URL: "https://services.swpc.noaa.gov/json/ovation_aurora_latest.json"
          OUT_DIR: "./data/history"
          PROB_MIN: "0"
        run: |
          node <<'NODE'
          import fs from "fs";
          import path from "path";

          const OVATION_URL = process.env.OVATION_URL;
          const OUT_DIR     = process.env.OUT_DIR || "./data/history";
          const PROB_MIN    = Number(process.env.PROB_MIN ?? "0");

          function ensureDir(dir) { fs.mkdirSync(dir, { recursive: true }); }
          function isoNow() { return new Date().toISOString(); }
          function ymd(iso) { return iso.slice(0, 10); }
          function hmsZ(iso) { return iso.slice(11, 19).replaceAll(":", "") + "Z"; }

          async function fetchJson(url) {
            const res = await fetch(url, { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
            return await res.json();
          }

          function normalizeLon(lon) {
            if (lon > 180) return lon - 360;
            if (lon < -180) return lon + 360;
            return lon;
          }

          function ovationToCsvRows(ovationJson, probMin = 0) {
            const coords = Array.isArray(ovationJson?.coordinates) ? ovationJson.coordinates : [];
            const rows = [];
            for (const entry of coords) {
              if (!entry || entry.length < 3) continue;
              let lon = Number(entry[0]);
              let lat = Number(entry[1]);
              const prob = Number(entry[2]);
              if (!Number.isFinite(lon) || !Number.isFinite(lat) || !Number.isFinite(prob)) continue;

              if (Math.abs(lat) > 90 && Math.abs(lon) <= 90) [lon, lat] = [lat, lon];
              lon = normalizeLon(lon);
              if (Math.abs(lat) > 90) continue;
              if (prob <= probMin) continue;

              rows.push(`${lon},${lat},${prob}`);
            }
            return rows;
          }

          async function writeFileAtomic(filepath, content) {
            ensureDir(path.dirname(filepath));
            const tmp = `${filepath}.tmp`;
            await fs.promises.writeFile(tmp, content);
            await fs.promises.rename(tmp, filepath);
          }

          const ts = isoNow();
          const day = ymd(ts);
          const timeKey = hmsZ(ts);

          const ovation = await fetchJson(OVATION_URL);

          const jsonPath = path.join(OUT_DIR, "ovation", day, `${timeKey}.json`);
          await writeFileAtomic(jsonPath, JSON.stringify({ collected_at: ts, ...ovation }, null, 2));

          const csvPath = path.join(OUT_DIR, "ovation_csv", day, `${timeKey}.csv`);
          const rows = ovationToCsvRows(ovation, PROB_MIN);
          const header = "lon,lat,probability\n";
          await writeFileAtomic(csvPath, header + rows.join("\n") + "\n");

          console.log(`[ok] ${ts}`);
          console.log(`  json: ${jsonPath}`);
          console.log(`  csv:  ${csvPath}`);
          NODE

      - name: Prune snapshots older than 30 days
        run: |
          python3 - <<'PY'
          import os, re, shutil
          from datetime import datetime, timedelta

          base = "./data/history"
          keep_days = 30
          cutoff = datetime.utcnow().date() - timedelta(days=keep_days)

          date_re = re.compile(r"^\d{4}-\d{2}-\d{2}$")

          for sub in ["ovation", "ovation_csv"]:
              root = os.path.join(base, sub)
              if not os.path.isdir(root):
                  continue
              for d in os.listdir(root):
                  if not date_re.match(d):
                      continue
                  try:
                      day = datetime.strptime(d, "%Y-%m-%d").date()
                  except ValueError:
                      continue
                  if day < cutoff:
                      shutil.rmtree(os.path.join(root, d), ignore_errors=True)
          PY

      - name: Detect new snapshot CSVs
        id: detect_csv
        shell: bash
        run: |
          set -euo pipefail
          # Detecta cambios en CSVs de snapshots (excluye el merge global)
          if git status --porcelain | awk '{print $2}' | grep -E '^data/history/ovation_csv/[0-9]{4}-[0-9]{2}-[0-9]{2}/[0-9]{6}Z\.csv$' >/dev/null; then
            echo "new_csv=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_csv=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build/Update GLOBAL merged CSV (only if new CSV exists)
        if: steps.detect_csv.outputs.new_csv == 'true'
        run: |
          python3 - <<'PY'
          import os, re, glob, tempfile
          from datetime import datetime

          BASE = "./data/history/ovation_csv"
          OUT_DIR = "./data/history/global_merge"
          OUT_PATH = os.path.join(OUT_DIR, "ovation_merged.csv")

          day_re = re.compile(r"^\d{4}-\d{2}-\d{2}$")
          file_re = re.compile(r"^(?P<hh>\d{2})(?P<mm>\d{2})(?P<ss>\d{2})Z\.csv$")

          def ensure_dir(p): os.makedirs(p, exist_ok=True)

          def write_atomic(path, content: str):
            ensure_dir(os.path.dirname(path))
            fd, tmp = tempfile.mkstemp(prefix=".tmp_", dir=os.path.dirname(path))
            try:
              with os.fdopen(fd, "w", encoding="utf-8", newline="\n") as f:
                f.write(content)
              os.replace(tmp, path)
            finally:
              try:
                if os.path.exists(tmp):
                  os.remove(tmp)
              except Exception:
                pass

          def iter_snapshot_files():
            if not os.path.isdir(BASE):
              return
            for day in sorted(os.listdir(BASE)):
              if not day_re.match(day): 
                continue
              day_dir = os.path.join(BASE, day)
              if not os.path.isdir(day_dir):
                continue
              for f in sorted(os.listdir(day_dir)):
                m = file_re.match(f)
                if not m:
                  continue
                yield day, os.path.join(day_dir, f), f

          def snapshot_ts(day: str, filename: str) -> str:
            # day = YYYY-MM-DD, filename = HHMMSSZ.csv -> YYYY-MM-DDTHH:MM:SSZ
            hh = filename[0:2]; mm = filename[2:4]; ss = filename[4:6]
            return f"{day}T{hh}:{mm}:{ss}Z"

          header = "snapshot_time_utc,lon,lat,probability\n"
          out_lines = [header]

          total_files = 0
          total_rows = 0

          for day, path, fname in iter_snapshot_files():
            ts = snapshot_ts(day, fname)
            with open(path, "r", encoding="utf-8", errors="replace") as fp:
              lines = fp.read().splitlines()

            if not lines:
              continue

            # Quitar header si es el esperado
            start = 1 if lines[0].strip().lower() == "lon,lat,probability" else 0
            for ln in lines[start:]:
              if not ln.strip():
                continue
              # cada ln: lon,lat,probability
              out_lines.append(f"{ts},{ln}")
              total_rows += 1

            total_files += 1

          write_atomic(OUT_PATH, "\n".join(out_lines) + "\n")
          print(f"[global_merge] wrote {OUT_PATH}")
          print(f"[global_merge] snapshot files: {total_files}, rows: {total_rows}")
          PY

      - name: Commit and push if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add data/history
            git commit -m "chore(history): add OVATION snapshot + global merge [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
