<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="t d">
<title id="t">Arquitectura conceptual del proyecto</title>
<desc id="d">Diagrama en SVG del runtime web, estado, overlays y pipeline offline.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#081520"/>
    <stop offset="100%" stop-color="#12344a"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#12344a" stop-opacity="0.96"/>
    <stop offset="100%" stop-color="#0b2231" stop-opacity="0.96"/>
  </linearGradient>
  <style>
    .title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#ecf8ff}
    .subtitle{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#a9dff8}
    .label{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#f3fbff}
    .text{font:400 15px 'Segoe UI',Arial,sans-serif;fill:#d6f2ff}
    .mini{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#82d9ff;letter-spacing:.08em;text-transform:uppercase}
    .chip{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#081520}
    .num{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#5bc0ff}
  </style>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/>

<text x="60" y="72" class="mini">Documento académico</text>
<text x="60" y="118" class="title">Arquitectura conceptual</text>
<g stroke="#82d9ff" stroke-width="3" fill="none" stroke-linecap="round">
  <path d="M330 250 H500"/><path d="M700 250 H865"/><path d="M600 320 V415"/>
  <path d="M220 520 H980"/>
</g>
<g>
  <rect x="70" y="190" width="260" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="100" y="230" class="label">Presentación</text><text x="100" y="268" class="text">index.html + style.css</text>
  <rect x="500" y="190" width="200" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="530" y="230" class="label">Orquestación</text><text x="530" y="268" class="text">js/app.js</text>
  <rect x="870" y="190" width="250" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="900" y="230" class="label">Estado</text><text x="900" y="268" class="text">App.state centralizado</text>
  <rect x="420" y="415" width="360" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="450" y="455" class="label">Servicios y render</text>
  <text x="450" y="493" class="text">js/data/* · js/globe/* · js/overlays/* · js/ui/*</text>
  <rect x="80" y="580" width="270" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="110" y="620" class="label">NOAA OVATION</text><text x="110" y="658" class="text">Feed JSON casi en tiempo real</text>
  <rect x="465" y="580" width="270" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="495" y="620" class="label">clouds.json</text><text x="495" y="658" class="text">Contrato intermedio estable</text>
  <rect x="850" y="580" width="270" height="120" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="880" y="620" class="label">Pipeline offline</text><text x="880" y="658" class="text">MODIS → script Python → artefacto</text>
</g>
</svg>