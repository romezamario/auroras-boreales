<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
<title id="t">Flujo metodológico y de publicación</title>
<desc id="d">Secuencia resumida de adquisición, tratamiento y publicación del sitio.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#081520"/>
    <stop offset="100%" stop-color="#12344a"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#12344a" stop-opacity="0.96"/>
    <stop offset="100%" stop-color="#0b2231" stop-opacity="0.96"/>
  </linearGradient>
  <style>
    .title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#ecf8ff}
    .subtitle{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#a9dff8}
    .label{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#f3fbff}
    .text{font:400 15px 'Segoe UI',Arial,sans-serif;fill:#d6f2ff}
    .mini{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#82d9ff;letter-spacing:.08em;text-transform:uppercase}
    .chip{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#081520}
    .num{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#5bc0ff}
  </style>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/>

<text x="60" y="72" class="mini">Documento académico</text>
<text x="60" y="118" class="title">Flujo de adquisición y publicación</text>
<g transform="translate(70 210)">
  <rect width="180" height="220" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="30" y="52" class="num">1</text><text x="30" y="88" class="label">Fuentes</text>
  <text x="30" y="128" class="text">NOAA</text><text x="30" y="156" class="text">MODIS / Earthdata</text><text x="30" y="184" class="text">Servicios auxiliares</text>
  <rect x="250" width="180" height="220" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="280" y="52" class="num">2</text><text x="280" y="88" class="label">Tratamiento</text>
  <text x="280" y="128" class="text">Normalización</text><text x="280" y="156" class="text">Malla global</text><text x="280" y="184" class="text">Metadatos</text>
  <rect x="500" width="180" height="220" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="530" y="52" class="num">3</text><text x="530" y="88" class="label">Artefactos</text>
  <text x="530" y="128" class="text">clouds.json</text><text x="530" y="156" class="text">Estado versionable</text><text x="530" y="184" class="text">Bundle estático</text>
  <rect x="750" width="180" height="220" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="780" y="52" class="num">4</text><text x="780" y="88" class="label">Publicación</text>
  <text x="780" y="128" class="text">GitHub Pages</text><text x="780" y="156" class="text">Sitio consultable</text><text x="780" y="184" class="text">Sin backend</text>
  <g stroke="#82d9ff" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M190 110 H236"/><path d="M440 110 H486"/><path d="M690 110 H736"/>
  </g>
</g>
<text x="70" y="520" class="subtitle">La clave operativa es desacoplar la ingestión y el tratamiento del tiempo de ejecución del navegador.</text>
</svg>