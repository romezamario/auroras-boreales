<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
<title id="t">Arquitectura lógica ejecutiva</title>
<desc id="d">Resumen visual de capas del sistema y separación runtime/offline.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#081520"/>
    <stop offset="100%" stop-color="#12344a"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#12344a" stop-opacity="0.96"/>
    <stop offset="100%" stop-color="#0b2231" stop-opacity="0.96"/>
  </linearGradient>
  <style>
    .title{font:700 30px 'Segoe UI',Arial,sans-serif;fill:#ecf8ff}
    .subtitle{font:400 16px 'Segoe UI',Arial,sans-serif;fill:#a9dff8}
    .label{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#f3fbff}
    .text{font:400 15px 'Segoe UI',Arial,sans-serif;fill:#d6f2ff}
    .mini{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#82d9ff;letter-spacing:.08em;text-transform:uppercase}
    .chip{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#081520}
    .num{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#5bc0ff}
  </style>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/>

<text x="60" y="72" class="mini">Presentación ejecutiva</text>
<text x="60" y="118" class="title">Arquitectura lógica</text>
<text x="60" y="152" class="subtitle">Separación de responsabilidades y partición entre runtime web y pipeline offline.</text>
<g>
  <rect x="70" y="215" width="210" height="140" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="100" y="255" class="label">Presentación</text><text x="100" y="293" class="text">HTML + CSS</text>
  <rect x="310" y="215" width="210" height="140" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="340" y="255" class="label">App</text><text x="340" y="293" class="text">Orquestación</text>
  <rect x="550" y="215" width="210" height="140" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="580" y="255" class="label">Estado</text><text x="580" y="293" class="text">App.state</text>
  <rect x="790" y="215" width="320" height="140" rx="24" fill="url(#panel)" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="820" y="255" class="label">Servicios + render + UI</text><text x="820" y="293" class="text">data · globe · overlays · ui</text>
</g>
<g stroke="#82d9ff" stroke-width="4" fill="none"><path d="M280 285 H305"/><path d="M520 285 H545"/><path d="M760 285 H785"/></g>
<g>
  <rect x="120" y="455" width="390" height="120" rx="24" fill="#11354b" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="150" y="495" class="label">Runtime web</text><text x="150" y="533" class="text">Consume NOAA, geolocalización IP y clouds.json</text>
  <rect x="620" y="455" width="420" height="120" rx="24" fill="#11354b" stroke="#5bc0ff" stroke-opacity=".35"/>
  <text x="650" y="495" class="label">Pipeline offline</text><text x="650" y="533" class="text">Script Python transforma productos MODIS en artefacto estable</text>
</g>
</svg>